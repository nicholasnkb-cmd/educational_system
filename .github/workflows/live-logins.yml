name: Verify live role logins

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  logins:
    runs-on: ubuntu-latest
    env:
      EDU_GLOBAL_ADMIN_PASSWORD: ${{ secrets.EDU_GLOBAL_ADMIN_PASSWORD }}
      EDU_STATE_ADMIN_PASSWORD: ${{ secrets.EDU_STATE_ADMIN_PASSWORD }}
      EDU_DISTRICT_ADMIN_PASSWORD: ${{ secrets.EDU_DISTRICT_ADMIN_PASSWORD }}
      EDU_SCHOOL_ADMIN_PASSWORD: ${{ secrets.EDU_SCHOOL_ADMIN_PASSWORD }}
      EDU_TEACHER_PASSWORD: ${{ secrets.EDU_TEACHER_PASSWORD }}
      EDU_PARENT_PASSWORD: ${{ secrets.EDU_PARENT_PASSWORD }}
      EDU_STUDENT_PASSWORD: ${{ secrets.EDU_STUDENT_PASSWORD }}
      FIELD_SUPER_ADMIN_EMAIL: ${{ secrets.FIELD_SUPER_ADMIN_EMAIL }}
      FIELD_SUPER_ADMIN_PASSWORD: ${{ secrets.FIELD_SUPER_ADMIN_PASSWORD }}
      FIELD_TENANT_ADMIN_EMAIL: ${{ secrets.FIELD_TENANT_ADMIN_EMAIL }}
      FIELD_TENANT_ADMIN_PASSWORD: ${{ secrets.FIELD_TENANT_ADMIN_PASSWORD }}
      FIELD_TECHNICIAN_EMAIL: ${{ secrets.FIELD_TECHNICIAN_EMAIL }}
      FIELD_TECHNICIAN_PASSWORD: ${{ secrets.FIELD_TECHNICIAN_PASSWORD }}
      FIELD_CLIENT_EMAIL: ${{ secrets.FIELD_CLIENT_EMAIL }}
      FIELD_CLIENT_PASSWORD: ${{ secrets.FIELD_CLIENT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify every education role
        shell: bash
        run: |
          set -euo pipefail
          for entry in \
            "global-admin:$EDU_GLOBAL_ADMIN_PASSWORD" \
            "state-admin:$EDU_STATE_ADMIN_PASSWORD" \
            "district-admin:$EDU_DISTRICT_ADMIN_PASSWORD" \
            "school-admin:$EDU_SCHOOL_ADMIN_PASSWORD" \
            "teacher:$EDU_TEACHER_PASSWORD" \
            "parent:$EDU_PARENT_PASSWORD" \
            "student:$EDU_STUDENT_PASSWORD"; do
            profile=${entry%%:*}
            password=${entry#*:}
            test -n "$password"
            response=$(curl --fail --silent --show-error --max-time 20 \
              -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg p "$profile" --arg s "$password" '{identifier:$p,password:$s}')" \
              https://api.educationalsystem.fieldserviceit.com/api/login)
            jq -e --arg p "$profile" '.ok == true and .token and .user.id == $p' <<<"$response" >/dev/null
            if [ "$profile" = "global-admin" ]; then
              echo "EDU_GLOBAL_ADMIN_TOKEN=$(jq -er '.token' <<<"$response")" >> "$GITHUB_ENV"
            fi
          done
      - name: Verify FieldserviceIT roles
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$FIELD_SUPER_ADMIN_EMAIL" ] || [ -z "$FIELD_SUPER_ADMIN_PASSWORD" ] || \
             [ -z "$FIELD_TENANT_ADMIN_EMAIL" ] || [ -z "$FIELD_TENANT_ADMIN_PASSWORD" ] || \
             [ -z "$FIELD_TECHNICIAN_EMAIL" ] || [ -z "$FIELD_TECHNICIAN_PASSWORD" ] || \
             [ -z "$FIELD_CLIENT_EMAIL" ] || [ -z "$FIELD_CLIENT_PASSWORD" ]; then
            echo "::warning::FieldserviceIT role credentials are not configured; API health and CORS remain monitored."
            exit 0
          fi
          for entry in \
            "$FIELD_SUPER_ADMIN_EMAIL:$FIELD_SUPER_ADMIN_PASSWORD" \
            "$FIELD_TENANT_ADMIN_EMAIL:$FIELD_TENANT_ADMIN_PASSWORD" \
            "$FIELD_TECHNICIAN_EMAIL:$FIELD_TECHNICIAN_PASSWORD" \
            "$FIELD_CLIENT_EMAIL:$FIELD_CLIENT_PASSWORD"; do
            email=${entry%%:*}
            password=${entry#*:}
            test -n "$email"
            test -n "$password"
            curl --fail --silent --show-error --max-time 20 \
              -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg e "$email" --arg p "$password" '{email:$e,password:$p}')" \
              https://api.fieldserviceit.com/v1/auth/login | jq -e '.accessToken and .user' >/dev/null
          done
      - name: Verify stale browser state cannot reset operational evidence
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EDU_GLOBAL_ADMIN_TOKEN"
          api=https://api.educationalsystem.fieldserviceit.com
          auth="Authorization: Bearer $EDU_GLOBAL_ADMIN_TOKEN"
          stale=$(curl --fail --silent --show-error --max-time 30 -H "$auth" "$api/api/state")
          backup=$(curl --fail --silent --show-error --max-time 30 -X POST -H "$auth" -H 'Content-Type: application/json' -d '{}' "$api/api/backups")
          backup_name=$(jq -er '.backup' <<<"$backup")
          curl --fail --silent --show-error --max-time 30 -X POST -H "$auth" -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg backup "$backup_name" '{backup:$backup}')" "$api/api/backups/restore-test" | jq -e '.ok == true' >/dev/null
          curl --fail --silent --show-error --max-time 30 -X POST -H "$auth" -H 'Content-Type: application/json' \
            -d '{"action":"run-job","jobId":"media-optimization"}' "$api/api/platform/actions" | jq -e '.ok == true and .job.status == "Completed"' >/dev/null
          stale_snapshot=$(jq '.snapshot
            | .productionReadiness.backups.lastBackup = "Not run"
            | .productionReadiness.backups.lastRestoreTest = "Not run"
            | (.productionReadiness.jobs[] | select(.id == "media-optimization") | .status) = "Queued"
            | (.productionReadiness.integrations[] | select(.id == "oneroster") | .status) = "Stale browser overwrite"' <<<"$stale")
          curl --fail --silent --show-error --max-time 60 -X PUT -H "$auth" -H 'Content-Type: application/json' \
            --data "$(jq -nc --argjson snapshot "$stale_snapshot" '{snapshot:$snapshot}')" "$api/api/state" | jq -e '.ok == true' >/dev/null
          sleep 20
          curl --fail --silent --show-error --max-time 30 -H "$auth" "$api/api/state" | jq -e '
            .snapshot.productionReadiness as $readiness
            | $readiness.backups.lastBackup != "Not run"
              and ($readiness.backups.lastRestoreTest | startswith("Passed"))
              and any($readiness.jobs[]; .id == "media-optimization" and .status == "Completed")
              and any($readiness.integrations[]; .id == "oneroster" and .status != "Stale browser overwrite")' >/dev/null
      - name: Verify the public landing page and global role workspace
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:live
