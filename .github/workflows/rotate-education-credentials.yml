name: Rotate education credentials

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      CURRENT_ADMIN_PASSWORD: ${{ secrets.EDU_STATE_ADMIN_PASSWORD }}
      NEXT_STATE_ADMIN_PASSWORD: ${{ secrets.NEXT_EDU_STATE_ADMIN_PASSWORD }}
      NEXT_DISTRICT_ADMIN_PASSWORD: ${{ secrets.NEXT_EDU_DISTRICT_ADMIN_PASSWORD }}
      NEXT_SCHOOL_ADMIN_PASSWORD: ${{ secrets.NEXT_EDU_SCHOOL_ADMIN_PASSWORD }}
      NEXT_TEACHER_PASSWORD: ${{ secrets.NEXT_EDU_TEACHER_PASSWORD }}
      NEXT_PARENT_PASSWORD: ${{ secrets.NEXT_EDU_PARENT_PASSWORD }}
      NEXT_STUDENT_PASSWORD: ${{ secrets.NEXT_EDU_STUDENT_PASSWORD }}
    steps:
      - name: Rotate all role credentials
        shell: bash
        run: |
          set -euo pipefail
          login=$(curl --fail --silent --show-error --max-time 30 \
            -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg p 'state-admin' --arg s "$CURRENT_ADMIN_PASSWORD" '{profileId:$p,password:$s}')" \
            https://api.educationalsystem.fieldserviceit.com/api/login)
          token=$(jq -er '.token' <<<"$login")
          for entry in \
            "district-admin:$NEXT_DISTRICT_ADMIN_PASSWORD" \
            "school-admin:$NEXT_SCHOOL_ADMIN_PASSWORD" \
            "teacher:$NEXT_TEACHER_PASSWORD" \
            "parent:$NEXT_PARENT_PASSWORD" \
            "student:$NEXT_STUDENT_PASSWORD" \
            "state-admin:$NEXT_STATE_ADMIN_PASSWORD"; do
            profile=${entry%%:*}
            password=${entry#*:}
            test -n "$password"
            curl --fail --silent --show-error --max-time 30 -X PATCH \
              -H "Authorization: Bearer $token" -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg p "$password" '{password:$p,mustChangePassword:false}')" \
              "https://api.educationalsystem.fieldserviceit.com/api/users/$profile" | jq -e '.ok == true' >/dev/null
          done
