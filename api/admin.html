<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EduConnect API Admin</title>
    <style>
      :root { color-scheme: light; font-family: Inter, Arial, sans-serif; color: #172033; background: #f4f7fb; }
      body { margin: 0; padding: 32px; }
      main { max-width: 980px; margin: 0 auto; display: grid; gap: 18px; }
      section { background: #fff; border: 1px solid #dbe3ef; border-radius: 8px; padding: 18px; box-shadow: 0 12px 30px rgba(30, 54, 92, .08); }
      h1, h2 { margin: 0 0 12px; }
      label { display: grid; gap: 6px; font-weight: 700; }
      input, select, button { font: inherit; border-radius: 6px; border: 1px solid #b9c5d8; padding: 10px 12px; }
      button { border: 0; background: #0050cb; color: #fff; font-weight: 800; cursor: pointer; }
      button.secondary { background: #23324a; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
      pre { overflow: auto; background: #101828; color: #eaf1ff; padding: 14px; border-radius: 6px; min-height: 120px; }
      small { color: #56667f; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>EduConnect API Admin</h1>
        <small>Dedicated API: https://api.educationalsystem.fieldserviceit.com</small>
      </section>
      <section>
        <h2>Sign In</h2>
        <div class="grid">
          <label>Role
            <select id="profile">
              <option value="state-admin">State Admin - NYS State Admin</option>
              <option value="district-admin">Admin - District Admin</option>
              <option value="school-admin">School Admin - School Admin</option>
              <option value="teacher">Teacher - Prof. Miller</option>
              <option value="parent">Parent - Sarah Jenkins</option>
              <option value="student">Student - Hero</option>
            </select>
          </label>
          <label>Password
            <input id="password" type="password" value="state123" />
          </label>
        </div>
        <div class="actions">
          <button id="login">Sign In</button>
          <button class="secondary" id="health">Health</button>
        </div>
      </section>
      <section>
        <h2>Operations</h2>
        <div class="actions">
          <button id="status">Admin Status</button>
          <button id="setup">Run Setup</button>
          <button id="backup">Create Backup</button>
          <button class="secondary" id="listBackups">List Backups</button>
        </div>
      </section>
      <section>
        <h2>Output</h2>
        <pre id="output">Ready.</pre>
      </section>
    </main>
    <script>
      let token = "";
      const output = document.querySelector("#output");
      const starterPasswords = {
        "state-admin": "state123",
        "district-admin": "admin123",
        "school-admin": "school123",
        teacher: "teacher123",
        parent: "parent123",
        student: "student123",
      };
      const show = (value) => { output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); };
      async function request(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(token ? { Authorization: `Bearer ${token}` } : {}),
            ...(options.headers || {}),
          },
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        return payload;
      }
      document.querySelector("#profile").onchange = (event) => {
        document.querySelector("#password").value = starterPasswords[event.target.value] || "";
      };
      document.querySelector("#health").onclick = async () => show(await request("/api/health"));
      document.querySelector("#login").onclick = async () => {
        const payload = await request("/api/login", {
          method: "POST",
          body: JSON.stringify({ profileId: document.querySelector("#profile").value, password: document.querySelector("#password").value }),
        });
        token = payload.token;
        show(payload);
      };
      document.querySelector("#status").onclick = async () => show(await request("/api/admin/status"));
      document.querySelector("#setup").onclick = async () => show(await request("/api/admin/setup", { method: "POST", body: "{}" }));
      document.querySelector("#backup").onclick = async () => show(await request("/api/backups", { method: "POST", body: "{}" }));
      document.querySelector("#listBackups").onclick = async () => show(await request("/api/backups"));
    </script>
  </body>
</html>
